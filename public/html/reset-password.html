<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/img/ICON-1.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nouveau mot de passe — Librairie Magma</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#000000 0%,#ffffff 100%);
    padding:24px 16px;
  }
  .card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 18px 48px rgba(0,0,0,.28);
    padding:32px 28px;
  }
  .logo{display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .logo img{height:54px;width:auto;display:block;object-fit:contain}
  h1{font-size:22px;font-weight:700;color:#2b293a;margin-bottom:6px;text-align:center}
  .subtitle{font-size:13px;color:#777;margin-bottom:22px;line-height:1.5;text-align:center}
  .field{margin-bottom:14px}
  label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:600}
  input{
    width:100%;
    padding:12px 14px;
    border:1px solid #d4d4d4;
    border-radius:6px;
    font-size:14px;
    background:#f7f7f7;
    color:#222;
    outline:none;
    transition:border-color .15s,background .15s;
  }
  input:focus{border-color:#ff690c;background:#fff}
  .hint{font-size:11px;color:#999;margin-top:5px;line-height:1.4}
  .btn{
    width:100%;
    padding:13px;
    background:#ff690c;
    color:#fff;
    font-size:15px;
    font-weight:700;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:8px;
    transition:background .15s;
  }
  .btn:hover{background:#e55a00}
  .btn:disabled{background:#ccc;cursor:not-allowed}
  .alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px;line-height:1.4}
  .alert-err{background:#fee4e2;color:#b42318;border:1px solid #fecdca}
  .alert-ok{background:#ecfdf3;color:#1f7a4d;border:1px solid #c8eed8}
  .footer-link{display:block;text-align:center;margin-top:18px;font-size:13px;color:#777}
  .footer-link a{color:#ff690c;text-decoration:none;font-weight:700}
  .footer-link a:hover{text-decoration:underline}

  @media (max-width:480px){
    body{padding:16px 12px}
    .card{padding:24px 20px;border-radius:8px}
    .logo img{height:46px}
    h1{font-size:20px}
  }
  @media (max-width:360px){
    .card{padding:20px 16px}
    h1{font-size:18px}
    .subtitle{font-size:12px}
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="/img/Copilot_20260402_080209.png" alt="Librairie Magma"></div>
  <h1>Nouveau mot de passe</h1>
  <p class="subtitle">Choisissez un nouveau mot de passe pour réactiver l'accès à votre compte.</p>
  <div id="alerts"></div>
  <div id="form-zone">
    <div class="field">
      <label for="pw1">Nouveau mot de passe</label>
      <input id="pw1" type="password" autocomplete="new-password">
      <div class="hint">8 caractères minimum, au moins une lettre et un chiffre.</div>
    </div>
    <div class="field">
      <label for="pw2">Confirmer le mot de passe</label>
      <input id="pw2" type="password" autocomplete="new-password">
    </div>
    <button id="submit" class="btn" type="button">Mettre à jour</button>
  </div>
  <div class="footer-link"><a href="/login.html">Retour à la connexion</a></div>
</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var token = params.get("token") || "";
  var alerts = document.getElementById("alerts");
  var formZone = document.getElementById("form-zone");
  function show(type, msg){
    alerts.innerHTML = '<div class="alert alert-' + (type === "ok" ? "ok" : "err") + '">' + msg + '</div>';
  }
  if (!token) {
    show("err", "Lien de réinitialisation manquant ou invalide.");
    formZone.style.display = "none";
    return;
  }
  document.getElementById("submit").addEventListener("click", function(){
    var pw1 = document.getElementById("pw1").value;
    var pw2 = document.getElementById("pw2").value;
    if (!pw1 || !pw2) { show("err", "Veuillez saisir et confirmer le mot de passe."); return; }
    if (pw1 !== pw2) { show("err", "Les deux mots de passe ne correspondent pas."); return; }
    if (pw1.length < 8) { show("err", "Le mot de passe doit contenir au moins 8 caractères."); return; }
    if (!/[A-Za-z]/.test(pw1) || !/\d/.test(pw1)) { show("err", "Le mot de passe doit contenir au moins une lettre et un chiffre."); return; }
    var btn = document.getElementById("submit");
    btn.disabled = true;
    fetch("/api/auth/reset-password", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({token: token, password: pw1})
    }).then(function(r){
      return r.json().then(function(d){ return {ok: r.ok, data: d}; });
    }).then(function(res){
      if (!res.ok) {
        show("err", (res.data && res.data.error) || "Impossible de mettre à jour le mot de passe.");
        btn.disabled = false;
        return;
      }
      show("ok", res.data.message || "Mot de passe mis à jour.");
      formZone.style.display = "none";
      setTimeout(function(){ window.location.href = "/login.html?info=" + encodeURIComponent("Mot de passe mis à jour. Connectez-vous."); }, 1800);
    }).catch(function(){
      show("err", "Erreur réseau. Réessayez.");
      btn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
