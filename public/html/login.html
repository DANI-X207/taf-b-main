<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/img/ICON-1.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8e8e8;
  }

  .container {
    display: flex;
    width: min(900px, 96vw);
    min-height: 480px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    flex: 1;
    position: relative;
    background: url('/img/vlad-ciutacu-rNvGfllb0u4-unsplash.png') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 28px 32px 32px;
    min-width: 260px;
  }
  .panel-left::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(30,40,30,.35);
    z-index: 0;
  }
  .panel-left > * { position: relative; z-index: 1; }

  .logo-wrap {
    width: 54px;
    height: 54px;
    margin-bottom: 28px;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .panel-left h2 {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    line-height: 1.25;
    letter-spacing: .3px;
  }

  /* ── RIGHT PANEL ── */
  .panel-right {
    width: 380px;
    flex-shrink: 0;
    background: #f9f9f9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 40px;
  }

  .panel-right h1 {
    font-size: 32px;
    font-weight: 400;
    color: #888;
    margin-bottom: 8px;
  }

  .panel-right .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .error-msg {
    background: #fee4e2;
    color: #b42318;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .info-msg {
    background: #e0f2fe;
    color: #0369a1;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
  }

  .field-group {
    margin-bottom: 18px;
  }

  .field-group label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }

  .field-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 14px;
    background: #f0f0f0;
    color: #333;
    outline: none;
    transition: border-color .2s;
  }
  .field-group input:focus {
    border-color: #ff690c;
    background: #fff;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #555;
    margin-bottom: 24px;
  }
  .remember input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: #ff690c;
    cursor: pointer;
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: #ff690c;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-login:hover { background: #e55a00; }

  .register-link {
    margin-top: 18px;
    font-size: 13px;
    color: #888;
    text-align: center;
  }
  .register-link a {
    color: #ff690c;
    text-decoration: none;
    font-weight: 600;
  }
  .register-link a:hover { text-decoration: underline; }

  @media (max-width: 620px) {
    .panel-left { display: none; }
    .panel-right { width: 100%; padding: 40px 28px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- LEFT -->
  <div class="panel-left">
    <div class="logo-wrap">
      <img src="/img/Logo version mobile.png" alt="Logo Magma">
    </div>
    <h2>Connecter vous sur<br>Magma</h2>
  </div>

  <!-- RIGHT -->
  <div class="panel-right">
    <h1>Login</h1>
    <p class="subtitle">Bienvenu entrer votre identifiant<br>s'il vous plait</p>

    <div id="error-container"></div>

    <form id="login-form" method="post" action="/auth/login">
      <div class="field-group">
        <label for="email">Nom d'utilisateur ou Email</label>
        <input type="text" id="email" name="email" required autocomplete="username email" placeholder="">
      </div>
      <div class="field-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="">
      </div>
      <div class="remember">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Se souvenir de moi</label>
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>

    <p class="register-link">Pas encore de compte ? <a href="/register.html">Créer un compte</a></p>
  </div>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var info = params.get("info");
  var err = params.get("error");
  var container = document.getElementById("error-container");
  if (info && container) {
    var d = document.createElement("div");
    d.className = "info-msg";
    d.textContent = decodeURIComponent(info);
    container.appendChild(d);
  }
  if (err && container) {
    var d2 = document.createElement("div");
    d2.className = "error-msg";
    d2.textContent = decodeURIComponent(err);
    container.appendChild(d2);
  }
})();
</script>
</body>
</html>
