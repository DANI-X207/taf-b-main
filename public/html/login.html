<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/img/ICON-1.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion — Librairie Mayombe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ff690c 0%, #f59e0b 45%, #2b293a 100%);
  }
  .container {
    display: flex;
    width: min(900px, 96vw);
    min-height: 480px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .panel-left {
    flex: 1;
    position: relative;
    background: url('/img/WhatsApp%20Image%202025-11-19%20at%2012.10.23.jpeg') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 28px 32px 32px;
    min-width: 260px;
  }
  .panel-left::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(30,40,30,.35);
    z-index: 0;
  }
  .panel-left > * { position: relative; z-index: 1; }
  .logo-wrap {
    width: 54px;
    height: 54px;
    margin-bottom: 28px;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
  }
  .panel-left h2 {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    line-height: 1.25;
    letter-spacing: .3px;
  }
  .panel-right {
    width: 380px;
    flex-shrink: 0;
    background: #f9f9f9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 40px;
  }
  .panel-right h1 {
    font-size: 32px;
    font-weight: 400;
    color: #888;
    margin-bottom: 8px;
  }
  .panel-right .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .error-msg {
    background: #fee4e2;
    color: #b42318;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
    display: none;
  }
  .info-msg {
    background: #e0f2fe;
    color: #0369a1;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
    display: none;
  }
  .field-group { margin-bottom: 18px; }
  .field-group label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  .field-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 14px;
    background: #f0f0f0;
    color: #333;
    outline: none;
    transition: border-color .2s;
  }
  .field-group input:focus { border-color: #ff690c; background: #fff; }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #555;
    margin-bottom: 24px;
  }
  .remember input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: #ff690c; cursor: pointer;
  }
  .btn-login {
    width: 100%;
    padding: 13px;
    background: #ff690c;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-login:hover { background: #e55a00; }
  .btn-login:disabled { background: #ffa870; cursor: not-allowed; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
    border-top-color: #fff; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .register-link {
    margin-top: 18px; font-size: 13px; color: #888; text-align: center;
  }
  .register-link a { color: #ff690c; text-decoration: none; font-weight: 600; }
  .register-link a:hover { text-decoration: underline; }
  @media (max-width: 620px) {
    .panel-left { display: none; }
    .panel-right { width: 100%; padding: 40px 28px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="panel-left">
    <div class="logo-wrap">
      <img src="/img/Logo version mobile.png" alt="Logo Mayombe">
    </div>
    <h2>Connectez-vous sur<br>Mayombe</h2>
  </div>

  <div class="panel-right">
    <h1>Connexion</h1>
    <p class="subtitle">Bienvenue, entrez votre identifiant<br>s'il vous plaît</p>

    <div id="error-msg" class="error-msg"></div>
    <div id="info-msg" class="info-msg"></div>

    <form id="login-form">
      <div class="field-group">
        <label for="email">N° de téléphone ou Email</label>
        <input type="text" id="email" required autocomplete="username email" placeholder="">
      </div>
      <div class="field-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="">
      </div>
      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Se souvenir de moi</label>
      </div>
      <button type="submit" class="btn-login" id="login-submit">Se connecter</button>
    </form>

    <p class="register-link">Pas encore de compte ? <a href="/register.html">Créer un compte</a></p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const params = new URLSearchParams(window.location.search);
  const info = params.get("info");
  const err = params.get("error");
  
  if (info) {
    const el = document.getElementById("info-msg");
    el.textContent = decodeURIComponent(info);
    el.style.display = "block";
  }
  if (err) {
    const el = document.getElementById("error-msg");
    el.textContent = decodeURIComponent(err);
    el.style.display = "block";
  }

  // Auto-fill remember
  const remEmail = localStorage.getItem("magma_remember_email");
  if (remEmail) {
    document.getElementById("email").value = remEmail;
    document.getElementById("remember").checked = true;
  }

  const form = document.getElementById("login-form");
  form.addEventListener("submit", function(e) {
    e.preventDefault();
    const btn = document.getElementById("login-submit");
    const errEl = document.getElementById("error-msg");
    
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value;
    const remember = document.getElementById("remember").checked;

    errEl.style.display = "none";
    btn.disabled = true;
    const origHtml = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> Connexion...';

    fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: pass, remember: remember })
    })
    .then(res => res.json().then(data => ({ok: res.ok, data: data})))
    .then(res => {
      if (!res.ok) throw new Error(res.data.error || "Erreur de connexion");
      if (remember) localStorage.setItem("magma_remember_email", email);
      else localStorage.removeItem("magma_remember_email");
      window.location.href = "/";
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerHTML = origHtml;
      errEl.textContent = err.message;
      errEl.style.display = "block";
    });
  });
});
</script>

</body>
</html>
