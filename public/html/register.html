<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/img/ICON-1.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inscription — Librairie Magma</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2b293a;
  }
  .container {
    display: flex;
    width: min(960px, 92vw);
    min-height: 540px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    background: #fff;
  }
  .panel-left {
    flex: 1.2;
    position: relative;
    background: url('/img/WhatsApp%20Image%202025-11-19%20at%2012.10.23.jpeg') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    min-width: 320px;
  }
  .panel-left::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(43,41,58,0.9) 0%, rgba(255,105,12,0.85) 100%);
    z-index: 0;
  }
  .panel-left > * { position: relative; z-index: 1; }
  .logo-wrap {
    width: 110px;
    height: 110px;
    margin-bottom: 24px;
    background: #fff;
    padding: 8px;
    border-radius: 50%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: 50%;
  }
  .panel-left h2 {
    font-size: 32px; font-weight: 800; color: #fff; line-height: 1.2; letter-spacing: 0.5px; margin: 0 0 12px; text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  .panel-left p { color: rgba(255,255,255,.85); font-size: 14.5px; line-height: 1.6; margin: 0; }
  
  .panel-right {
    flex: 1; background: #ffffff; display: flex; flex-direction: column; justify-content: center; padding: 50px;
  }
  .panel-right h1 { font-size: 32px; font-weight: 800; color: #2b293a; margin: 0 0 8px; }
  .panel-right .subtitle { font-size: 14.5px; color: #666; margin: 0 0 28px; line-height: 1.5; }
  
  .error-msg { background: #fee4e2; color: #b42318; padding: 10px 14px; border-radius: 6px; margin: 0 0 16px; font-size: 13px; display: none; }
  .field-group { margin-bottom: 20px; }
  .field-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 8px; }
  .field-group input { width: 100%; padding: 12px 14px; border: 1px solid #e2e2e2; border-radius: 8px; font-size: 14px; background: #fafafa; color: #333; outline: none; transition: all .25s ease; }
  .field-group input:focus { border-color: #ff690c; background: #fff; box-shadow: 0 0 0 4px rgba(255,105,12,0.1); }
  
  .btn-submit { width: 100%; padding: 14px; background: #ff690c; color: #fff; font-size: 15px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; letter-spacing: .5px; transition: all .2s ease; box-shadow: 0 4px 12px rgba(255,105,12,0.3); }
  .btn-submit:hover { background: #e55a00; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(255,105,12,0.4); }
  .btn-submit:disabled { background: #ffa870; cursor: not-allowed; transform: none; box-shadow: none; }
  
  .login-link { margin-top: 24px; font-size: 13.5px; color: #888; text-align: center; }
  .login-link a { color: #ff690c; text-decoration: none; font-weight: 700; }
  .login-link a:hover { text-decoration: underline; }
  
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
    border-top-color: #fff; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 820px) {
    .container { flex-direction: column; width: 100%; border-radius: 0; min-height: 100vh; }
    body { align-items: flex-start; }
    .panel-left { flex: 0 0 auto; padding: 50px 20px 70px; }
    .panel-left h2 { font-size: 26px; }
    .logo-wrap { width: 90px; height: 90px; }
    .panel-right { flex: 1; border-radius: 30px 30px 0 0; margin-top: -40px; position: relative; z-index: 10; padding: 40px 24px; box-shadow: 0 -10px 25px rgba(0,0,0,0.15); }
  }
  @media (max-width: 480px) {
    .panel-right { padding: 30px 20px; }
    .panel-right h1 { font-size: 28px; }
    .btn-submit { padding: 16px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="panel-left">
    <div class="logo-wrap">
      <img src="/img/Logo version mobile.png" alt="Logo Magma">
    </div>
    <h2>Rejoignez<br>Librairie Magma</h2>
    <p>Accédez à notre catalogue,<br>gérez votre panier et<br>suivez vos commandes.</p>
  </div>

  <div class="panel-right">
    <h1>Créer un compte</h1>
    <p class="subtitle">Remplissez le formulaire pour commencer</p>

    <div id="error-msg" class="error-msg"></div>

    <form id="register-form">
      <div class="field-group">
        <label for="name">Nom complet</label>
        <input type="text" id="name" required autocomplete="name">
      </div>
      <div class="field-group">
        <label for="email">Email <span style="color:#aaa;font-size:11px;">(Facultatif)</span></label>
        <input type="email" id="email" autocomplete="email">
      </div>
      <div class="field-group">
        <label for="phone">Numéro de téléphone <span style="color:#aaa;font-size:11px;">(9 chiffres sans espaces)</span></label>
        <input type="tel" id="phone" required autocomplete="tel" placeholder="Ex: 061234567">
      </div>
      <div class="field-group" style="margin-bottom:24px;">
        <label for="password">Mot de passe <span style="color:#aaa;font-size:11px;">(min. 8, lettre+chiffre)</span></label>
        <input type="password" id="password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-submit" id="reg-submit">Créer mon compte</button>
    </form>
    
    <p class="login-link">Déjà un compte ? <a href="/login.html">Se connecter</a></p>
    
    <p style="margin-top:16px;font-size:12px;color:#aaa;text-align:center;">En créant un compte, vous acceptez nos conditions d'utilisation.</p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  function formatPhoneInput(rawDigits) {
    return String(rawDigits || "").replace(/\D+/g, "").slice(0, 9);
  }
  
  const phoneInput = document.getElementById("phone");
  phoneInput.addEventListener("input", function() {
    var caretAtEnd = this.selectionStart === this.value.length;
    var formatted = formatPhoneInput(this.value);
    this.value = formatted;
    if (caretAtEnd) {
      try { this.setSelectionRange(formatted.length, formatted.length); } catch (e) {}
    }
  });
  phoneInput.addEventListener("blur", function() {
    this.value = formatPhoneInput(this.value);
  });

  const form = document.getElementById("register-form");
  form.addEventListener("submit", function(e) {
    e.preventDefault();
    const btn = document.getElementById("reg-submit");
    const errEl = document.getElementById("error-msg");
    
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = formatPhoneInput(phoneInput.value);
    phoneInput.value = phone;
    const pass = document.getElementById("password").value;

    if (phone.replace(/\D+/g, "").length !== 9) {
      errEl.textContent = "Le numéro doit comporter 9 chiffres.";
      errEl.style.display = "block";
      return;
    }

    errEl.style.display = "none";
    btn.disabled = true;
    const origHtml = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> Création...';

    fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, email: email, phone: phone.replace(/\\D+/g, ""), password: pass })
    })
    .then(res => res.json().then(data => ({ok: res.ok, data: data})))
    .then(res => {
      if (!res.ok) throw new Error(res.data.error || "Erreur lors de l'inscription");
      window.location.href = "/login.html?info=" + encodeURIComponent("Votre compte a été créé avec succès. Vous pouvez maintenant vous connecter.");
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerHTML = origHtml;
      errEl.textContent = err.message;
      errEl.style.display = "block";
    });
  });
});
</script>

</body>
</html>
